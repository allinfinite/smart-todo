name: Deploy Dokku

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: dokku-smart-todo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_DEPLOY_KEY }}

      - name: Add Dokku host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.DOKKU_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Dokku
        run: |
          git remote add dokku "dokku@${{ vars.DOKKU_HOST }}:${{ vars.DOKKU_APP }}"
          git push dokku HEAD:main --force
