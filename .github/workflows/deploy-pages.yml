name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PORTAL_TEMPLATE_CONFIG_JSON: ${{ vars.PORTAL_TEMPLATE_CONFIG_JSON }}
      PORTAL_THEME_JSON: ${{ vars.PORTAL_THEME_JSON }}
      PORTAL_EXPERTS_JSON: ${{ vars.PORTAL_EXPERTS_JSON }}
      PORTAL_WAITING_MESSAGES_JSON: ${{ vars.PORTAL_WAITING_MESSAGES_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
